<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repo health dashboard</title>
<style>
  :root {
    --bg: #f4efe3;
    --panel: #fffaf0;
    --ink: #111111;
    --ink-soft: #454545;
    --line: #111111;
    --mono: "IBM Plex Mono", "SF Mono", Consolas, monospace;
    --sans: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --add: #005f2f;
    --add-bg: #7cff9b;
    --del: #111111;
    --del-bg: #ff5d5d;
    --amber: #111111;
    --amber-bg: #ffd84d;
    --blue: #111111;
    --blue-bg: #68d8ff;
    --pink: #ff79c6;
    --shadow: 7px 7px 0 #111111;
    --shadow-sm: 4px 4px 0 #111111;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background:
      linear-gradient(90deg, rgba(17,17,17,0.05) 1px, transparent 1px) 0 0 / 24px 24px,
      linear-gradient(rgba(17,17,17,0.05) 1px, transparent 1px) 0 0 / 24px 24px,
      var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    padding: 28px 18px 48px;
  }
  .wrap { max-width: 1120px; margin: 0 auto; }
  .masthead {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 3px solid var(--ink);
    background: var(--panel);
    box-shadow: var(--shadow);
    padding: 18px;
    margin-bottom: 28px;
    gap: 16px;
    flex-wrap: wrap;
  }
  h1 {
    font-family: var(--mono);
    font-size: clamp(28px, 5vw, 58px);
    line-height: 0.95;
    font-weight: 900;
    margin: 0;
    letter-spacing: 0;
    text-transform: uppercase;
  }
  .sub {
    display: inline-block;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink);
    font-weight: 700;
    margin-top: 8px;
  }
  .auth {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .scan-card {
    background: #b6ff6d;
    border: 3px solid var(--ink);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 22px;
  }
  .toolbar {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 12px;
    margin-bottom: 12px;
  }
  .mode-tabs {
    display: inline-grid;
    grid-template-columns: 1fr 1fr;
    border: 3px solid var(--ink);
    border-radius: 0;
    overflow: hidden;
    width: 240px;
    background: var(--panel);
    box-shadow: var(--shadow-sm);
  }
  .mode-tabs button {
    border: 0;
    background: transparent;
    color: var(--ink);
    border-radius: 0;
    padding: 12px;
  }
  .mode-tabs button + button {
    border-left: 3px solid var(--ink);
  }
  .mode-tabs button.active { background: var(--pink); color: var(--ink); }
  .search-row {
    display: flex;
    gap: 10px;
    min-width: 0;
  }
  input {
    width: 100%;
    font-family: var(--mono);
    font-size: 14px;
    padding: 13px 14px;
    border: 3px solid var(--ink);
    border-radius: 0;
    background: var(--panel);
    color: var(--ink);
    box-shadow: var(--shadow-sm);
  }
  input:focus { outline: 3px solid var(--blue-bg); outline-offset: 2px; }
  button {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 900;
    padding: 12px 16px;
    border: 3px solid var(--ink);
    background: var(--ink);
    color: var(--bg);
    border-radius: 0;
    cursor: pointer;
    white-space: nowrap;
    box-shadow: var(--shadow-sm);
    text-transform: uppercase;
    transition: transform 120ms ease, box-shadow 120ms ease;
  }
  button.secondary { background: var(--blue-bg); color: var(--ink); }
  button:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--ink); opacity: 1; }
  button:active { transform: translate(4px, 4px); box-shadow: none; }
  button:disabled { opacity: 0.5; cursor: default; }
  .hint {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    line-height: 1.45;
    color: var(--ink);
    margin: 0;
    max-width: 820px;
  }
  .hint code {
    font-family: var(--mono);
    background: var(--amber-bg);
    padding: 1px 5px;
    border-radius: 0;
    border: 2px solid var(--line);
  }
  .status {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 800;
    padding: 12px 14px;
    border-radius: 0;
    margin-bottom: 22px;
    box-shadow: var(--shadow-sm);
  }
  .status.error { background: var(--del-bg); color: var(--ink); border: 3px solid var(--ink); }
  .status.loading { background: var(--blue-bg); color: var(--ink); border: 3px solid var(--ink); }
  .status.ok { background: var(--add-bg); color: var(--ink); border: 3px solid var(--ink); }
  progress {
    display: block;
    width: 100%;
    height: 16px;
    margin-top: 10px;
    accent-color: var(--ink);
    border: 2px solid var(--ink);
  }
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }
  .metric {
    background: var(--panel);
    border: 3px solid var(--line);
    border-radius: 0;
    padding: 16px;
    min-width: 0;
    box-shadow: var(--shadow-sm);
  }
  .metric:nth-child(1) { background: #ffef5c; }
  .metric:nth-child(2) { background: #ff9ed8; }
  .metric:nth-child(3) { background: #78d7ff; }
  .metric:nth-child(4) { background: #98ff82; }
  .metric .label {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0;
    color: var(--ink);
    margin-bottom: 8px;
    font-weight: 900;
  }
  .metric .value {
    font-family: var(--mono);
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 900;
    line-height: 1;
    overflow-wrap: anywhere;
  }
  .section { margin-bottom: 28px; }
  .section h2 {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 900;
    margin: 0 0 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    text-transform: uppercase;
  }
  .section h2::before {
    content: "$";
    display: inline-grid;
    place-items: center;
    width: 28px;
    height: 28px;
    background: var(--pink);
    border: 3px solid var(--ink);
    color: var(--ink);
  }
  .panel {
    background: var(--panel);
    border: 3px solid var(--line);
    border-radius: 0;
    padding: 16px;
    box-shadow: var(--shadow);
    overflow-x: auto;
  }
  .insights {
    display: grid;
    grid-template-columns: 1.1fr repeat(3, 1fr);
    gap: 12px;
  }
  .insight {
    background: #fffdf8;
    border: 3px solid var(--ink);
    padding: 14px;
    min-width: 0;
  }
  .insight.score { background: #ffef5c; }
  .insight.warn { background: #ff9ed8; }
  .insight.good { background: #98ff82; }
  .insight.info { background: #78d7ff; }
  .insight .k {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .insight .v {
    font-family: var(--mono);
    font-size: clamp(24px, 4vw, 42px);
    line-height: 1;
    font-weight: 900;
  }
  .insight .note {
    margin-top: 10px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    line-height: 1.35;
  }
  .meter {
    height: 18px;
    border: 3px solid var(--ink);
    background: var(--panel);
    margin-top: 12px;
  }
  .meter-fill {
    height: 100%;
    background: var(--add-bg);
    border-right: 3px solid var(--ink);
  }
  .split-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 620px; }
  th {
    text-align: left;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    color: var(--ink);
    padding: 8px;
    border: 2px solid var(--line);
    background: var(--blue-bg);
  }
  td { padding: 10px 8px; border: 2px solid var(--line); vertical-align: top; background: #fffdf8; }
  tr:nth-child(odd) td { background: #f8f0ff; }
  tr:last-child td { border-bottom: none; }
  .pill {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 900;
    padding: 3px 8px;
    border-radius: 0;
    border: 2px solid var(--ink);
  }
  .pill.stale { background: var(--del-bg); color: var(--del); }
  .pill.old { background: var(--amber-bg); color: var(--amber); }
  .pill.ok { background: var(--add-bg); color: var(--add); }
  .pill.info { background: var(--blue-bg); color: var(--blue); }
  .empty { font-family: var(--mono); font-size: 12px; color: var(--ink); font-style: italic; font-weight: 700; }
  a { color: var(--ink); font-weight: 800; text-decoration-thickness: 2px; text-underline-offset: 3px; }
  .repo-name { font-family: var(--mono); }
  .chart-shell { position: relative; height: 260px; }
  @media (max-width: 820px) {
    body { padding: 18px 12px 34px; }
    .masthead { box-shadow: var(--shadow-sm); }
    .scan-card { box-shadow: var(--shadow-sm); }
    .toolbar { grid-template-columns: 1fr; }
    .mode-tabs { width: 100%; }
    .search-row { flex-direction: column; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .insights { grid-template-columns: 1fr 1fr; }
    .split-grid { grid-template-columns: 1fr; }
    table { font-size: 12px; }
  }
  @media (max-width: 520px) {
    .metrics { grid-template-columns: 1fr; }
    .insights { grid-template-columns: 1fr; }
    .auth { justify-content: flex-start; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <div>
      <h1>repo-health</h1>
      <span class="sub" id="clock"></span>
    </div>
    <div class="auth">
      <span class="sub" id="authState">anonymous: 60 req/hour</span>
      <button id="signInBtn" class="secondary">Sign in with GitHub</button>
      <button id="signOutBtn" class="secondary" style="display:none;">Sign out</button>
    </div>
  </div>

  <div class="scan-card">
    <div class="toolbar">
      <div class="search-row">
        <input id="targetInput" type="text" placeholder="owner/repo (e.g. facebook/react)">
        <button id="fetchBtn">scan</button>
      </div>
      <div class="mode-tabs" aria-label="Dashboard mode">
        <button id="repoModeBtn" class="active" type="button">repo</button>
        <button id="orgModeBtn" type="button">org</button>
      </div>
    </div>
    <p class="hint" id="modeHint">
      Repo mode accepts <code>owner/repo</code> or a GitHub URL. Sign in to use authenticated requests and raise the REST API limit from 60/hour to 5,000/hour.
    </p>
  </div>

  <div id="statusBox"></div>
  <div id="dashboard" style="display:none;">
    <div class="metrics" id="metrics"></div>

    <div class="section">
      <h2 id="analysisTitle">health analysis</h2>
      <div class="panel" id="analysisPanel"></div>
    </div>

    <div class="section">
      <h2 id="issueTitle">oldest open issues</h2>
      <div class="panel" id="issuePanel"></div>
    </div>

    <div class="section">
      <h2 id="prTitle">oldest open pull requests</h2>
      <div class="panel" id="prPanel"></div>
    </div>

    <div class="section">
      <h2 id="branchTitle">branch staleness</h2>
      <div class="panel" id="branchPanel"></div>
    </div>

    <div class="section">
      <h2 id="contribTitle">top contributors</h2>
      <div class="panel" id="contribPanel">
        <div class="chart-shell">
          <canvas id="contribChart" role="img" aria-label="Bar chart of top contributors by commit count"></canvas>
        </div>
      </div>
    </div>

    <div class="section">
      <h2 id="inventoryTitle">repo inventory</h2>
      <div class="panel" id="inventoryPanel"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const API = "https://api.github.com";
const OAUTH_CLIENT_ID = "Ov23liN9Pb4Adv8DOfqL";
const OAUTH_SCOPE = "public_repo";
const ORG_REPO_CONCURRENCY = 4;
const AUTH_BRANCH_LIMIT = 20;
const ANON_BRANCH_LIMIT = 8;

const clock = document.getElementById("clock");
const targetInput = document.getElementById("targetInput");
const fetchBtn = document.getElementById("fetchBtn");
const repoModeBtn = document.getElementById("repoModeBtn");
const orgModeBtn = document.getElementById("orgModeBtn");
const modeHint = document.getElementById("modeHint");
const statusBox = document.getElementById("statusBox");
const dashboard = document.getElementById("dashboard");
const signInBtn = document.getElementById("signInBtn");
const signOutBtn = document.getElementById("signOutBtn");
const authState = document.getElementById("authState");
const metrics = document.getElementById("metrics");
const analysisPanel = document.getElementById("analysisPanel");
const issuePanel = document.getElementById("issuePanel");
const prPanel = document.getElementById("prPanel");
const branchPanel = document.getElementById("branchPanel");
const contribPanel = document.getElementById("contribPanel");
const inventoryPanel = document.getElementById("inventoryPanel");

let mode = "repo";
let chartInstance = null;
let token = sessionStorage.getItem("github_token") || "";
let currentUser = JSON.parse(sessionStorage.getItem("github_user") || "null");
let latestRate = null;

clock.textContent = new Date().toISOString().slice(0, 16).replace("T", " ");
updateAuthUi();
handleOAuthCallback();

function daysAgo(dateStr) {
  return Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function fmt(n) {
  return Number(n || 0).toLocaleString();
}

function setStatus(msg, type = "loading", progress = null) {
  if (!msg) {
    statusBox.innerHTML = "";
    return;
  }
  const bar = progress ? `<progress max="${progress.total}" value="${progress.done}"></progress>` : "";
  statusBox.innerHTML = `<div class="status ${type}">${escapeHtml(msg)}${bar}</div>`;
}

function setMode(nextMode) {
  mode = nextMode;
  repoModeBtn.classList.toggle("active", mode === "repo");
  orgModeBtn.classList.toggle("active", mode === "org");
  targetInput.placeholder = mode === "repo" ? "owner/repo (e.g. facebook/react)" : "org name (e.g. vercel)";
  fetchBtn.textContent = mode === "repo" ? "scan repo" : "scan org";
  modeHint.innerHTML = mode === "repo"
    ? 'Repo mode accepts <code>owner/repo</code> or a GitHub URL. Sign in to use authenticated requests and raise the REST API limit from 60/hour to 5,000/hour.'
    : 'Org mode fetches every repo with <code>GET /orgs/{org}/repos</code>, then scans repos in small batches. Large orgs can take a while and use many requests.';
}

function parseRepoSlug(raw) {
  let s = raw.trim();
  s = s.replace(/^git@github\.com:/, "");
  s = s.replace(/^https?:\/\/(www\.)?github\.com\//i, "");
  s = s.replace(/\.git$/i, "");
  s = s.replace(/^\/+|\/+$/g, "");
  const parts = s.split("/").filter(Boolean);
  if (parts.length < 2) return null;
  return `${parts[0]}/${parts[1]}`;
}

function parseOrg(raw) {
  let s = raw.trim();
  s = s.replace(/^https?:\/\/(www\.)?github\.com\//i, "");
  s = s.replace(/^\/+|\/+$/g, "");
  return s.split("/").filter(Boolean)[0] || "";
}

function authHeaders() {
  const headers = {
    "Accept": "application/vnd.github+json",
    "X-GitHub-Api-Version": "2022-11-28"
  };
  if (token) headers.Authorization = `Bearer ${token}`;
  return headers;
}

async function ghFetch(path) {
  let res;
  try {
    res = await fetch(`${API}${path}`, { headers: authHeaders() });
  } catch {
    throw new Error("Network request to the GitHub API failed. Check your connection and try again.");
  }
  if (!res.ok) {
    const remaining = res.headers.get("x-ratelimit-remaining");
    if (res.status === 401) {
      signOut();
      throw new Error("GitHub rejected the saved token. Sign in again and retry.");
    }
    if ((res.status === 403 || res.status === 429) && remaining === "0") {
      throw new Error("GitHub API rate limit hit. Sign in or wait for the current rate window to reset.");
    }
    if (res.status === 404) throw new Error("GitHub resource not found. Check the spelling and permissions.");
    let detail = "";
    try {
      const body = await res.json();
      detail = body.message ? `: ${body.message}` : "";
    } catch {}
    throw new Error(`GitHub API error ${res.status}${detail}`);
  }
  const data = await res.json();
  data.__link = res.headers.get("link") || "";
  data.__rateRemaining = res.headers.get("x-ratelimit-remaining");
  latestRate = {
    limit: Number(res.headers.get("x-ratelimit-limit") || 0),
    remaining: Number(res.headers.get("x-ratelimit-remaining") || 0),
    reset: Number(res.headers.get("x-ratelimit-reset") || 0)
  };
  return data;
}

async function ghFetchPaged(path, maxPages = Infinity) {
  const out = [];
  let page = 1;
  while (page <= maxPages) {
    const sep = path.includes("?") ? "&" : "?";
    const batch = await ghFetch(`${path}${sep}per_page=100&page=${page}`);
    out.push(...batch);
    if (!hasNext(batch.__link) || batch.length === 0) break;
    page += 1;
  }
  return out;
}

function hasNext(link) {
  return /rel="next"/.test(link || "");
}

function countFromLink(items) {
  const link = items.__link || "";
  const match = link.match(/[?&]page=(\d+)>;\s*rel="last"/);
  if (match) return Number(match[1]);
  return items.length;
}

async function getOpenPullSummary(slug, oldestLimit = 8) {
  const [countProbe, pulls] = await Promise.all([
    ghFetch(`/repos/${slug}/pulls?state=open&per_page=1`),
    ghFetch(`/repos/${slug}/pulls?state=open&sort=created&direction=asc&per_page=${oldestLimit}`)
  ]);
  return { count: countFromLink(countProbe), oldest: pulls.slice(0, oldestLimit) };
}

async function getBranchStaleness(repo, limit) {
  const branches = await ghFetch(`/repos/${repo.full_name}/branches?per_page=100`).catch(() => []);
  const toCheck = branches.filter(b => b.name !== repo.default_branch).slice(0, limit);
  const rows = await mapLimit(toCheck, 4, async branch => {
    try {
      const commits = await ghFetch(`/repos/${repo.full_name}/commits?sha=${encodeURIComponent(branch.name)}&per_page=1`);
      const date = commits[0]?.commit?.committer?.date || commits[0]?.commit?.author?.date;
      return date ? { repo: repo.full_name, branch: branch.name, days: daysAgo(date) } : null;
    } catch {
      return null;
    }
  });
  const valid = rows.filter(Boolean);
  return {
    checked: toCheck.length,
    totalNonDefault: Math.max(0, branches.length - 1),
    staleCount: valid.filter(r => r.days > 90).length,
    oldest: valid.sort((a, b) => b.days - a.days)
  };
}

async function getContributors(slug, limit = 10) {
  return ghFetch(`/repos/${slug}/contributors?per_page=${limit}`).catch(() => []);
}

async function getOldIssues(slug, limit = 8) {
  const issues = await ghFetch(`/repos/${slug}/issues?state=open&sort=created&direction=asc&per_page=${limit * 2}`).catch(() => []);
  return issues.filter(issue => !issue.pull_request).slice(0, limit);
}

async function getLanguages(slug) {
  return ghFetch(`/repos/${slug}/languages`).catch(() => ({}));
}

async function loadRepo() {
  const slug = parseRepoSlug(targetInput.value);
  if (!slug) {
    setStatus("Enter a repo as owner/repo, or paste a full GitHub URL, like torvalds/linux.", "error");
    return;
  }
  fetchBtn.disabled = true;
  dashboard.style.display = "none";
  setStatus(`Fetching ${slug}...`, "loading");

  try {
    const [repo, pullSummary, contributors, oldIssues, languages] = await Promise.all([
      ghFetch(`/repos/${slug}`),
      getOpenPullSummary(slug, 100),
      getContributors(slug, 10),
      getOldIssues(slug, 10),
      getLanguages(slug)
    ]);
    const branchLimit = token ? AUTH_BRANCH_LIMIT : ANON_BRANCH_LIMIT;
    setStatus(`Checking up to ${branchLimit} non-default branches...`, "loading");
    const branchSummary = await getBranchStaleness(repo, branchLimit);
    const openIssueCount = Math.max(0, repo.open_issues_count - pullSummary.count);
    renderRepo({
      repo,
      openIssueCount,
      openPrCount: pullSummary.count,
      pulls: pullSummary.oldest,
      branchSummary,
      contributors,
      oldIssues,
      languages
    });
    setStatus("", "ok");
  } catch (err) {
    setStatus(err.message, "error");
  } finally {
    fetchBtn.disabled = false;
  }
}

async function loadOrg() {
  const org = parseOrg(targetInput.value);
  if (!org) {
    setStatus("Enter a GitHub organization name, like vercel or microsoft.", "error");
    return;
  }
  fetchBtn.disabled = true;
  dashboard.style.display = "none";
  setStatus(`Fetching repositories for ${org}...`, "loading");

  try {
    const repos = await ghFetchPaged(`/orgs/${encodeURIComponent(org)}/repos?type=all&sort=pushed&direction=desc`);
    if (repos.length === 0) {
      setStatus(`No repositories found for ${org}.`, "error");
      return;
    }

    const totals = {
      repos: repos.length,
      stars: repos.reduce((sum, repo) => sum + repo.stargazers_count, 0),
      openIssues: 0,
      openPrs: 0,
      oldestPrs: [],
      oldestIssues: [],
      staleRepos: [],
      contributors: new Map(),
      branchesChecked: 0,
      inactiveRepos: [],
      archivedRepos: 0,
      forkRepos: 0,
      templateRepos: 0,
      languageCounts: new Map(),
      riskFlags: []
    };
    let done = 0;
    const branchLimit = token ? AUTH_BRANCH_LIMIT : ANON_BRANCH_LIMIT;

    await mapLimit(repos, ORG_REPO_CONCURRENCY, async repo => {
      const slug = repo.full_name;
      const [pullSummary, branchSummary, contributors, oldIssues] = await Promise.all([
        getOpenPullSummary(slug, 5).catch(() => ({ count: 0, oldest: [] })),
        getBranchStaleness(repo, branchLimit).catch(() => ({ checked: 0, totalNonDefault: 0, staleCount: 0, oldest: [] })),
        getContributors(slug, 10),
        getOldIssues(slug, 3)
      ]);

      totals.openPrs += pullSummary.count;
      totals.openIssues += Math.max(0, repo.open_issues_count - pullSummary.count);
      totals.oldestPrs.push(...pullSummary.oldest.map(pr => ({ ...pr, repo: slug })));
      totals.oldestIssues.push(...oldIssues.map(issue => ({ ...issue, repo: slug })));
      totals.branchesChecked += branchSummary.checked;
      totals.archivedRepos += repo.archived ? 1 : 0;
      totals.forkRepos += repo.fork ? 1 : 0;
      totals.templateRepos += repo.is_template ? 1 : 0;
      if (repo.language) {
        totals.languageCounts.set(repo.language, (totals.languageCounts.get(repo.language) || 0) + 1);
      }
      const inactiveDays = daysAgo(repo.pushed_at || repo.updated_at);
      if (inactiveDays > 180) {
        totals.inactiveRepos.push({
          repo: slug,
          days: inactiveDays,
          archived: repo.archived,
          fork: repo.fork,
          openIssues: Math.max(0, repo.open_issues_count - pullSummary.count),
          openPrs: pullSummary.count
        });
      }
      totals.staleRepos.push({
        repo: slug,
        staleCount: branchSummary.staleCount,
        checked: branchSummary.checked,
        totalNonDefault: branchSummary.totalNonDefault,
        oldest: branchSummary.oldest[0] || null,
        pushedAt: repo.pushed_at
      });
      contributors.forEach(c => {
        const prev = totals.contributors.get(c.login) || { login: c.login, contributions: 0, html_url: c.html_url };
        prev.contributions += c.contributions;
        totals.contributors.set(c.login, prev);
      });
      done += 1;
      setStatus(`Scanned ${done}/${repos.length} repos. GitHub calls are batched at ${ORG_REPO_CONCURRENCY} repos at a time.`, "loading", { done, total: repos.length });
    });

    renderOrg(org, totals);
    setStatus(`Finished scanning ${repos.length} repos for ${org}.`, "ok");
  } catch (err) {
    setStatus(err.message, "error");
  } finally {
    fetchBtn.disabled = false;
  }
}

function renderRepo(data) {

    <div class="metric"><div class="label">Open PRs</div><div class="value">${fmt(data.openPrCount)}</div></div>

  `;
  renderAnalysis(health, repoInsights(data, health));

function renderOrg(org, totals) {
  dashboard.style.display = "block";
  document.getElementById("analysisTitle").textContent = "org health analysis";
  document.getElementById("issueTitle").textContent = "oldest open issues org-wide";
  document.getElementById("prTitle").textContent = "oldest open pull requests org-wide";
  document.getElementById("branchTitle").textContent = "repos with stale branches";
  document.getElementById("contribTitle").textContent = "most active contributors org-wide";
  document.getElementById("inventoryTitle").textContent = "org inventory";
  const health = scoreOrgHealth(totals);
  metrics.innerHTML = `
    <div class="metric"><div class="label">Org score</div><div class="value">${health.score}</div></div>
    <div class="metric"><div class="label">Open issues</div><div class="value">${fmt(totals.openIssues)}</div></div>
    <div class="metric"><div class="label">Open PRs</div><div class="value">${fmt(totals.openPrs)}</div></div>
    <div class="metric"><div class="label">Repos scanned</div><div class="value">${fmt(totals.repos)}</div></div>
  `;
  renderAnalysis(health, orgInsights(totals, health));
  renderIssues(totals.oldestIssues.sort((a, b) => daysAgo(b.created_at) - daysAgo(a.created_at)).slice(0, 12), true);
  const oldest = totals.oldestPrs
    .sort((a, b) => daysAgo(b.created_at) - daysAgo(a.created_at))
    .slice(0, 12);
  renderPulls(oldest, true);
  renderStaleRepos(totals.staleRepos);
  renderContributors([...totals.contributors.values()].sort((a, b) => b.contributions - a.contributions).slice(0, 12));
  renderOrgInventory(totals);
}

function scoreRepoHealth(data) {
  const oldestPr = Math.max(0, ...data.pulls.map(p => daysAgo(p.created_at)));
  const oldestIssue = Math.max(0, ...data.oldIssues.map(i => daysAgo(i.created_at)));
  const staleBranches = data.branchSummary.staleCount;
  const inactiveDays = daysAgo(data.repo.pushed_at || data.repo.updated_at);
  const contributorCount = data.contributors.length;
  const isDormantEmptyRepo = inactiveDays > 180
    && data.repo.stargazers_count === 0
    && data.openIssueCount === 0
    && data.openPrCount === 0;
  let score = 100;
  score -= Math.min(25, Math.floor(oldestPr / 10));
  score -= Math.min(20, Math.floor(oldestIssue / 14));
  score -= Math.min(20, staleBranches * 5);
  score -= inactivityPenalty(inactiveDays);
  score -= data.repo.archived ? 35 : 0;
  score -= data.openPrCount > 50 ? 12 : data.openPrCount > 15 ? 6 : 0;
  score -= contributorCount === 0 ? 10 : 0;
  score -= isDormantEmptyRepo ? 15 : 0;
  return {
    score: clamp(score, 0, 100),
    grade: healthGrade(score),
    oldestPr,
    oldestIssue,
    staleBranches,
    inactiveDays,
    contributorCount,
    isDormantEmptyRepo
  };
}

function inactivityPenalty(days) {
  if (days > 365) return 45;
  if (days > 180) return 30;
  if (days > 90) return 15;
  if (days > 45) return 6;
  return 0;
}

function scoreOrgHealth(totals) {
  const oldestPr = Math.max(0, ...totals.oldestPrs.map(p => daysAgo(p.created_at)));
  const oldestIssue = Math.max(0, ...totals.oldestIssues.map(i => daysAgo(i.created_at)));
  const staleRepos = totals.staleRepos.filter(r => r.staleCount > 0).length;
  const inactiveRepos = totals.inactiveRepos.length;
  const repoCount = Math.max(1, totals.repos);
  let score = 100;
  score -= Math.min(25, Math.floor(oldestPr / 21));
  score -= Math.min(20, Math.floor(oldestIssue / 30));
  score -= Math.min(20, Math.round((staleRepos / repoCount) * 60));
  score -= Math.min(18, Math.round((inactiveRepos / repoCount) * 45));
  score -= Math.min(12, Math.round((totals.archivedRepos / repoCount) * 40));
  return {
    score: clamp(score, 0, 100),
    grade: healthGrade(score),
    oldestPr,
    oldestIssue,
    staleRepos,
    inactiveRepos
  };
}

function healthGrade(score) {
  const n = clamp(score, 0, 100);
  if (n >= 85) return "solid";
  if (n >= 70) return "healthy";
  if (n >= 50) return "watch";
  if (n >= 30) return "risk";
  return "critical";
}

function clamp(n, min, max) {
  return Math.max(min, Math.min(max, n));
}

function repoInsights(data, health) {
  const flags = [];
  if (data.repo.archived) flags.push("Repository is archived.");
  if (data.repo.fork) flags.push("Repository is a fork.");
  if (health.oldestPr > 90) flags.push(`Oldest open PR is ${health.oldestPr} days old.`);
  if (health.oldestIssue > 180) flags.push(`Oldest open issue is ${health.oldestIssue} days old.`);
  if (health.staleBranches > 0) flags.push(`${health.staleBranches} checked branches are stale.`);
  if (health.inactiveDays > 180) flags.push(`Default activity looks quiet: last push was ${health.inactiveDays} days ago.`);
  if (health.contributorCount === 0) flags.push("No contributor data was returned.");
  if (health.isDormantEmptyRepo) flags.push("Dormant repo with no stars, open issues, or open PRs.");
  if (flags.length === 0) flags.push("No major repo hygiene flags in the sampled data.");
  return [
    { kind: "warn", label: "Risk flags", value: flags.length, note: flags.slice(0, 2).join(" ") },
    { kind: "info", label: "Last push", value: `${health.inactiveDays}d`, note: data.repo.default_branch ? `Default branch: ${data.repo.default_branch}` : "Default branch unavailable" },
    { kind: "good", label: "API budget", value: latestRate?.remaining ? fmt(latestRate.remaining) : "-", note: latestRate?.limit ? `${fmt(latestRate.limit)} request/hour limit` : "Rate headers unavailable" }
  ];
}

function orgInsights(totals, health) {
  const repoCount = Math.max(1, totals.repos);
  return [
    { kind: "warn", label: "Inactive repos", value: fmt(health.inactiveRepos), note: `${Math.round((health.inactiveRepos / repoCount) * 100)}% have no pushes in 180+ days.` },
    { kind: "info", label: "Stale branch repos", value: fmt(health.staleRepos), note: `${Math.round((health.staleRepos / repoCount) * 100)}% had stale checked branches.` },
    { kind: "good", label: "API budget", value: latestRate?.remaining ? fmt(latestRate.remaining) : "-", note: latestRate?.limit ? `${fmt(latestRate.limit)} request/hour limit` : "Rate headers unavailable" }
  ];
}

function renderAnalysis(health, cards) {
  analysisPanel.innerHTML = `
    <div class="insights">
      <div class="insight score">
        <div class="k">Health score</div>
        <div class="v">${health.score}/100</div>
        <div class="meter"><div class="meter-fill" style="width:${health.score}%; background:${scoreColor(health.score)};"></div></div>
        <div class="note">${health.grade.toUpperCase()} based on PR age, issue age, branch staleness, and activity.</div>
      </div>
      ${cards.map(card => `
        <div class="insight ${card.kind}">
          <div class="k">${escapeHtml(card.label)}</div>
          <div class="v">${escapeHtml(card.value)}</div>
          <div class="note">${escapeHtml(card.note)}</div>
        </div>
      `).join("")}
    </div>
  `;
}

function scoreColor(score) {
  if (score >= 85) return "#7cff9b";
  if (score >= 70) return "#ffd84d";
  if (score >= 50) return "#ff9ed8";
  return "#ff5d5d";
}

      ${issues.map(issue => {
        const age = daysAgo(issue.created_at);
        const cls = age > 180 ? "stale" : age > 60 ? "old" : "ok";
        return `<tr>
          ${showRepo ? `<td class="repo-name">${escapeHtml(issue.repo)}</td>` : ""}
          <td><a href="${issue.html_url}" target="_blank" rel="noopener">#${issue.number}</a> ${escapeHtml(issue.title).slice(0, 72)}</td>

  inventoryPanel.innerHTML = `
    <div class="split-grid">

        <table>

          <tr><td>Default branch</td><td>${escapeHtml(data.repo.default_branch || "-")}</td></tr>
          <tr><td>Visibility</td><td>${data.repo.private ? "private" : "public"}</td></tr>
          <tr><td>Fork / archived</td><td>${data.repo.fork ? "fork" : "source"} / ${data.repo.archived ? "archived" : "active"}</td></tr>
          <tr><td>Last push</td><td>${daysAgo(data.repo.pushed_at || data.repo.updated_at)}d ago</td></tr>
          <tr><td>Watchers</td><td>${fmt(data.repo.subscribers_count || data.repo.watchers_count)}</td></tr>

          <tr><th>Language</th><th>Share</th></tr>
          ${langs.map(([name, bytes]) => `<tr><td>${escapeHtml(name)}</td><td><span class="pill info">${Math.round((bytes / totalBytes) * 100)}%</span></td></tr>`).join("")}
        </table>` : '<div class="empty">Language data unavailable.</div>'}
      </div>
    </div>
  `;
}

  const languages = [...totals.languageCounts.entries()]
    .sort((a, b) => b[1] - a[1])

    <div class="split-grid">
      <div>
        <table>

          <tr><td>Fork repos</td><td>${fmt(totals.forkRepos)}</td></tr>
          <tr><td>Template repos</td><td>${fmt(totals.templateRepos)}</td></tr>
          <tr><td>Inactive 180d+</td><td>${fmt(totals.inactiveRepos.length)}</td></tr>

function renderStaleRepos(rows) {
  const ranked = rows
    .filter(r => r.checked > 0)

  branchPanel.innerHTML = `

async function mapLimit(items, limit, worker) {
  const results = new Array(items.length);
  let next = 0;
  const runners = Array.from({ length: Math.min(limit, items.length) }, async () => {
    while (next < items.length) {
      const index = next++;
      results[index] = await worker(items[index], index);
    }
  });
  await Promise.all(runners);
  return results;
}

async function signIn() {
  if (!OAUTH_CLIENT_ID || OAUTH_CLIENT_ID.startsWith("REPLACE_")) {
    setStatus("Set OAUTH_CLIENT_ID in index.html before using GitHub login.", "error");
    return;
  }
  const state = cryptoRandom();
  const verifier = cryptoRandom() + cryptoRandom();
  const challenge = await pkceChallenge(verifier);
  sessionStorage.setItem("oauth_state", state);
  sessionStorage.setItem("oauth_verifier", verifier);
  const redirectUri = `${location.origin}${location.pathname}`;
  const params = new URLSearchParams({
    client_id: OAUTH_CLIENT_ID,
    redirect_uri: redirectUri,
    scope: OAUTH_SCOPE,
    state,
    code_challenge: challenge,
    code_challenge_method: "S256",
    allow_signup: "true"
  });
  location.href = `https://github.com/login/oauth/authorize?${params.toString()}`;
}

async function handleOAuthCallback() {
  const params = new URLSearchParams(location.search);
  const code = params.get("code");
  const returnedState = params.get("state");
  if (!code) return;
  const expectedState = sessionStorage.getItem("oauth_state");
  const codeVerifier = sessionStorage.getItem("oauth_verifier");
  history.replaceState({}, document.title, location.pathname);
  if (!expectedState || returnedState !== expectedState) {
    setStatus("OAuth state mismatch. Sign-in was cancelled for safety.", "error");
    return;
  }
  sessionStorage.removeItem("oauth_state");
  sessionStorage.removeItem("oauth_verifier");
  setStatus("Exchanging GitHub authorization code...", "loading");
  try {
    const res = await fetch("/api/github-oauth", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        code,
        code_verifier: codeVerifier,
        redirect_uri: `${location.origin}${location.pathname}`
      })
    });
    const payload = await res.json();
    if (!res.ok) throw new Error(payload.error || "OAuth exchange failed.");
    token = payload.access_token;
    sessionStorage.setItem("github_token", token);
    currentUser = await ghFetch("/user");
    sessionStorage.setItem("github_user", JSON.stringify(currentUser));
    updateAuthUi();
    setStatus(`Signed in as ${currentUser.login}.`, "ok");
  } catch (err) {
    setStatus(err.message, "error");
  }
}

function signOut() {
  token = "";
  currentUser = null;
  sessionStorage.removeItem("github_token");
  sessionStorage.removeItem("github_user");
  updateAuthUi();
}

function updateAuthUi() {
  signInBtn.style.display = token ? "none" : "";
  signOutBtn.style.display = token ? "" : "none";
  authState.textContent = token
    ? `${currentUser?.login || "authenticated"}: 5,000 req/hour`
    : "anonymous: 60 req/hour";
}

function cryptoRandom() {
  const bytes = new Uint8Array(16);
  crypto.getRandomValues(bytes);
  return [...bytes].map(b => b.toString(16).padStart(2, "0")).join("");
}

async function pkceChallenge(verifier) {
  const bytes = new TextEncoder().encode(verifier);
  const hash = await crypto.subtle.digest("SHA-256", bytes);
  return btoa(String.fromCharCode(...new Uint8Array(hash)))
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/, "");
}

repoModeBtn.addEventListener("click", () => setMode("repo"));
orgModeBtn.addEventListener("click", () => setMode("org"));
fetchBtn.addEventListener("click", () => mode === "repo" ? loadRepo() : loadOrg());
targetInput.addEventListener("keydown", e => {
  if (e.key === "Enter") mode === "repo" ? loadRepo() : loadOrg();
});
signInBtn.addEventListener("click", signIn);
signOutBtn.addEventListener("click", signOut);
